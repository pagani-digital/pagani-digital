<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer — Pagani Digital</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css?v=1776608487261" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    .explore-page { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    .explore-header { text-align: center; margin-bottom: 2rem; }
    .explore-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .explore-header h1 span { color: var(--accent); }
    .explore-header p { color: var(--text2); font-size: 0.95rem; }
    .explore-filters { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
    .explore-filter-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: all 0.2s; }
    .explore-filter-btn:hover { background: rgba(108,99,255,0.1); border-color: var(--accent); color: var(--accent); }
    .explore-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .explore-search { max-width: 400px; margin: 0 auto 2rem; position: relative; }
    .explore-search input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.8rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 0.9rem; font-family: inherit; }
    .explore-search input:focus { outline: none; border-color: var(--accent); }
    .explore-search i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text2); }
    .explore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
    .explore-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.2s; cursor: pointer; }
    .explore-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); border-color: var(--accent); }
    .explore-avatar { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem; position: relative; }
    .explore-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .explore-avatar .avatar-circle { width: 80px; height: 80px; font-size: 1.8rem; }
    .explore-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; }
    .explore-plan { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 50px; margin-bottom: 0.6rem; }
    .explore-plan.starter { background: rgba(150,150,150,0.15); color: var(--text2); }
    .explore-plan.pro { background: rgba(108,99,255,0.15); color: var(--accent); }
    .explore-plan.elite { background: rgba(245,158,11,0.15); color: var(--gold); }
    .explore-bio { font-size: 0.82rem; color: var(--text2); margin-bottom: 0.8rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.3rem; }
    .explore-stats { display: flex; gap: 1rem; margin-bottom: 1rem; font-size: 0.8rem; }
    .explore-stat { display: flex; flex-direction: column; }
    .explore-stat strong { font-size: 1rem; color: var(--text); }
    .explore-stat span { color: var(--text2); font-size: 0.72rem; }
    .explore-follow-btn { width: 100%; padding: 0.6rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .explore-follow-btn.follow { background: var(--accent); color: #fff; }
    .explore-follow-btn.follow:hover { opacity: 0.9; }
    .explore-follow-btn.following { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .explore-follow-btn.following:hover { background: rgba(255,77,109,0.1); color: var(--red); border-color: var(--red); }
    .explore-follow-btn.admin-locked { background: rgba(108,99,255,0.1); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); cursor: not-allowed; opacity: 0.7; }
    .explore-empty { text-align: center; padding: 4rem 2rem; color: var(--text2); }
    .explore-empty i { font-size: 3rem; opacity: 0.3; margin-bottom: 1rem; display: block; }
    .explore-loading { display: flex; justify-content: center; padding: 3rem; }
    @media (max-width: 768px) {
      .explore-page { padding: 1.5rem 1rem; }
      .explore-header h1 { font-size: 1.6rem; }
      .explore-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Pagani<span>Digital</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="formations.html">Formations</a></li>
      <li><a href="ebooks.html">Ebooks</a></li>
      <li><a href="affiliation.html">Affiliation</a></li>
      <li><a href="explore.html" class="active">Explorer</a></li>
      <li><a href="plans.html">Tarifs</a></li>
      <li><a href="dashboard.html" class="btn-nav">Mon Espace</a></li>
    </ul>
    <div class="nav-right">
      <a id="navCustomBtn" href="#" target="_blank" rel="noopener" class="notif-bell" style="display:none" title="">
        <img id="navCustomBtnIcon" src="" alt="" style="width:18px;height:18px;object-fit:contain;border-radius:3px" />
      </a>
      <a href="messages.html" class="notif-bell msg-nav-btn" id="msgNavBtn" title="Messages">
        <i class="fas fa-envelope"></i>
        <span class="notif-badge" id="msgNavBadge" style="display:none">0</span>
      </a>
      <button class="notif-bell" id="notifBell" onclick="PaganiNotif.togglePanel()" title="Notifications">
        <i class="fas fa-bell"></i>
        <span class="notif-badge" id="notifBadge" style="display:none">0</span>
      </button>
      <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>
  </nav>

  <div class="explore-page">
    <div class="explore-header">
      <h1>Explorer <span>la communauté</span></h1>
      <p>Découvrez et suivez les membres de Pagani Digital</p>
    </div>

    <div class="explore-search">
      <i class="fas fa-search"></i>
      <input type="text" id="exploreSearch" placeholder="Rechercher un membre..." oninput="filterExplore()" />
    </div>

    <div class="explore-filters">
      <button class="explore-filter-btn active" onclick="filterByPlan('all', this)">Tous</button>
      <button class="explore-filter-btn" onclick="filterByPlan('Pro', this)"><i class="fas fa-crown"></i> Pro</button>
      <button class="explore-filter-btn" onclick="filterByPlan('Elite', this)"><i class="fas fa-gem"></i> Elite</button>
      <button class="explore-filter-btn" onclick="filterBySort('new', this)"><i class="fas fa-clock"></i> Nouveaux</button>
      <button class="explore-filter-btn" onclick="filterBySort('popular', this)"><i class="fas fa-fire"></i> Populaires</button>
    </div>

    <div id="exploreGrid" class="explore-grid">
      <div class="explore-loading">
        <div class="feed-loader"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <a href="index.html" class="logo">Pagani<span>Digital</span></a>
      <p>© 2025 Pagani Digital. Tous droits réservés.</p>
      <div class="social-links">
        <a id="footerFacebook" href="#" target="_blank" rel="noopener"><i class="fab fa-facebook"></i></a>
        <a id="footerTiktok" href="#" target="_blank" rel="noopener"><i class="fab fa-tiktok"></i></a>
        <a id="footerTelegram" href="#" target="_blank" rel="noopener"><i class="fab fa-telegram"></i></a>
        <a id="footerYoutube" href="#" target="_blank" rel="noopener"><i class="fab fa-youtube"></i></a>
      </div>
    </div>
  </footer>

  <div id="notifOverlay" onclick="PaganiNotif.togglePanel()" style="display:none;position:fixed;inset:0;z-index:499"></div>
  <div id="notifPanel" class="notif-panel"></div>

  <script src="/js/config.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/api.js?v=1776608487261"></script>
  <script src="/js/app.js?v=1776608487261"></script>
  <script>
    let _allUsers = [];
    let _currentUser = null;
    let _followStates = {}; // userId -> { following: bool, isAdmin: bool }
    let _activeFilter = 'all';
    let _activeSort = null;

    document.addEventListener('DOMContentLoaded', async () => {
      _currentUser = await refreshCurrentUser();
      updateNavbar(_currentUser);
      if (window.PaganiNotif) PaganiNotif.startPolling();
      loadFooterSocialLinks();
      await loadExplore();
    });

    async function loadExplore() {
      const grid = document.getElementById('exploreGrid');
      grid.innerHTML = '<div class="explore-loading"><div class="feed-loader"><span></span><span></span><span></span></div></div>';
      
      try {
        // Charger tous les users publics depuis l'API admin
        const users = await fetch((window.PaganiConfig?.API_BASE_URL || 'http://localhost:3001/api') + '/members').then(r => r.json());
        _allUsers = users.filter(u => u.id !== (_currentUser ? _currentUser.id : null));
        
        // Charger les stats follow pour chaque user
        await Promise.all(_allUsers.map(async u => {
          try {
            const stats = await PaganiAPI.getFollowStats(u.id);
            u.followers = stats.followers || 0;
            u.following = stats.following || 0;
          } catch(e) {
            u.followers = 0;
            u.following = 0;
          }
        }));

        // Charger l'état follow si connecté
        if (_currentUser) {
          await Promise.all(_allUsers.map(async u => {
            try {
              const status = await PaganiAPI.getFollowStatus(u.id);
              _followStates[u.id] = { following: status.following, isAdmin: status.isAdmin || false };
            } catch(e) {
              _followStates[u.id] = { following: false, isAdmin: false };
            }
          }));
        }

        renderExplore();
      } catch(e) {
        grid.innerHTML = '<div class="explore-empty"><i class="fas fa-exclamation-circle"></i><p>Erreur de chargement. Veuillez réessayer.</p></div>';
      }
    }

    function renderExplore() {
      const grid = document.getElementById('exploreGrid');
      let filtered = [..._allUsers];

      // Filtre par plan
      if (_activeFilter !== 'all') {
        filtered = filtered.filter(u => u.plan === _activeFilter);
      }

      // Filtre par recherche
      const search = document.getElementById('exploreSearch').value.toLowerCase().trim();
      if (search) {
        filtered = filtered.filter(u => u.name.toLowerCase().includes(search));
      }

      // Tri
      if (_activeSort === 'new') {
        filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      } else if (_activeSort === 'popular') {
        filtered.sort((a, b) => (b.followers || 0) - (a.followers || 0));
      }

      if (!filtered.length) {
        grid.innerHTML = '<div class="explore-empty"><i class="fas fa-users"></i><p>Aucun membre trouvé.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(u => {
        const initials = u.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const avatar = u.avatarPhoto
          ? `<img src="${u.avatarPhoto}" alt="${u.name}" />`
          : `<div class="avatar-circle" style="background:${u.avatarColor||'#6c63ff'}">${initials}</div>`;
        
        const planClass = u.plan.toLowerCase();
        const planIcon = u.plan === 'Elite' ? '<i class="fas fa-gem"></i>' : u.plan === 'Pro' ? '<i class="fas fa-crown"></i>' : '';
        
        const state = _followStates[u.id] || { following: false, isAdmin: false };
        let followBtn = '';
        if (!_currentUser) {
          followBtn = '<button class="explore-follow-btn follow" onclick="event.stopPropagation();window.location.href=\'dashboard.html\'"><i class="fas fa-user-plus"></i> Suivre</button>';
        } else if (state.following && state.isAdmin) {
          followBtn = `<div style="display:flex;gap:0.5rem">
            <button class="explore-follow-btn admin-locked" style="flex:1" disabled><i class="fas fa-lock"></i> Suivi</button>
            <a href="profil.html?id=${u.id}" class="explore-follow-btn following" style="flex:1;text-align:center;text-decoration:none" onclick="event.stopPropagation()"><i class="fas fa-eye"></i> Profil</a>
          </div>`;
        } else if (state.following) {
          followBtn = `<div style="display:flex;gap:0.5rem">
            <button class="explore-follow-btn following" style="flex:1" onclick="toggleFollowExplore(${u.id}, this)"><i class="fas fa-user-check"></i> Suivi</button>
            <a href="profil.html?id=${u.id}" class="explore-follow-btn follow" style="flex:1;text-align:center;text-decoration:none" onclick="event.stopPropagation()"><i class="fas fa-eye"></i> Profil</a>
          </div>`;
        } else {
          followBtn = `<button class="explore-follow-btn follow" onclick="toggleFollowExplore(${u.id}, this)"><i class="fas fa-user-plus"></i> Suivre</button>`;
        }

        return `
          <div class="explore-card" onclick="window.location.href='profil.html?id=${u.id}'">
            <div class="explore-avatar">${avatar}</div>
            <div class="explore-name">${u.name}</div>
            <span class="explore-plan ${planClass}">${planIcon} ${u.plan}</span>
            <div class="explore-bio">${u.bio || 'Aucune bio renseignée.'}</div>
            <div class="explore-stats">
              <div class="explore-stat">
                <strong>${u.followers || 0}</strong>
                <span>Followers</span>
              </div>
              <div class="explore-stat">
                <strong>${u.following || 0}</strong>
                <span>Abonnements</span>
              </div>
            </div>
            <div id="follow-zone-${u.id}">${followBtn}</div>
          </div>`;
      }).join('');
    }

    function filterByPlan(plan, btn) {
      _activeFilter = plan;
      _activeSort = null;
      document.querySelectorAll('.explore-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderExplore();
    }

    function filterBySort(sort, btn) {
      _activeSort = sort;
      _activeFilter = 'all';
      document.querySelectorAll('.explore-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderExplore();
    }

    function filterExplore() {
      renderExplore();
    }

    async function toggleFollowExplore(userId, btn) {
      event.stopPropagation();
      if (!_currentUser) { window.location.href = 'dashboard.html'; return; }

      const state = _followStates[userId] || {};
      if (state.following && state.isAdmin) return;

      btn.disabled = true;
      try {
        const res = await PaganiAPI.toggleFollow(userId);
        _followStates[userId] = { ..._followStates[userId], following: res.following };

        // Mettre à jour le compteur followers dans le cache
        const user = _allUsers.find(u => u.id === userId);
        if (user) user.followers = (user.followers || 0) + (res.following ? 1 : -1);

        // Remplacer uniquement la zone boutons
        const zone = document.getElementById(`follow-zone-${userId}`);
        if (!zone) return;
        if (res.following) {
          zone.innerHTML = `<div style="display:flex;gap:0.5rem">
            <button class="explore-follow-btn following" style="flex:1" onclick="toggleFollowExplore(${userId}, this)"><i class="fas fa-user-check"></i> Suivi</button>
            <a href="profil.html?id=${userId}" class="explore-follow-btn follow" style="flex:1;text-align:center;text-decoration:none" onclick="event.stopPropagation()"><i class="fas fa-eye"></i> Profil</a>
          </div>`;
        } else {
          zone.innerHTML = `<button class="explore-follow-btn follow" onclick="toggleFollowExplore(${userId}, this)"><i class="fas fa-user-plus"></i> Suivre</button>`;
        }
      } catch(e) {
        if (e.message === 'CANNOT_UNFOLLOW_ADMIN') {
          _followStates[userId] = { following: true, isAdmin: true };
          const zone = document.getElementById(`follow-zone-${userId}`);
          if (zone) zone.innerHTML = `<div style="display:flex;gap:0.5rem">
            <button class="explore-follow-btn admin-locked" style="flex:1" disabled><i class="fas fa-lock"></i> Suivi</button>
            <a href="profil.html?id=${userId}" class="explore-follow-btn follow" style="flex:1;text-align:center;text-decoration:none" onclick="event.stopPropagation()"><i class="fas fa-eye"></i> Profil</a>
          </div>`;
        } else {
          btn.disabled = false;
        }
      }
    }
  </script>
</body>
</html>
