<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer — Pagani Digital</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/style.css?v=1777106940613" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    .explore-page { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* Header compact */
    .explore-header { margin-bottom: 1.2rem; }
    .explore-header h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.2rem; }
    .explore-header h1 span { color: var(--accent); }
    .explore-header p { color: var(--text2); font-size: 0.85rem; }

    /* Barre sticky recherche + filtres */
    .explore-sticky { position: sticky; top: 60px; z-index: 100; background: var(--bg); padding: 0.8rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .explore-search { position: relative; margin-bottom: 0.7rem; }
    .explore-search input { width: 100%; padding: 0.65rem 1rem 0.65rem 2.6rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 50px; color: var(--text); font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s; }
    .explore-search input:focus { outline: none; border-color: var(--accent); }
    .explore-search i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 0.85rem; }
    .explore-search .clear-btn { position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; font-size: 0.85rem; display: none; }

    .explore-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .explore-filter-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 0.35rem 0.85rem; border-radius: 50px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
    .explore-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .explore-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Compteur */
    .explore-count { font-size: 0.8rem; color: var(--text2); margin-bottom: 0.8rem; }
    .explore-count strong { color: var(--text); }

    /* Liste compacte style Facebook */
    .explore-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .explore-row { display: flex; align-items: center; gap: 0.9rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 0.75rem 1rem; transition: border-color 0.2s; }
    .explore-row:hover { border-color: rgba(108,99,255,0.4); }
    .explore-row-avatar { flex-shrink: 0; cursor: pointer; }
    .explore-row-avatar img, .explore-row-avatar .avatar-circle { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; font-size: 1rem; }
    .explore-row-info { flex: 1; min-width: 0; cursor: pointer; }
    .explore-row-name { font-size: 0.92rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .explore-row-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.15rem; flex-wrap: wrap; }
    .explore-row-plan { font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 50px; font-weight: 600; }
    .explore-row-plan.starter { background: rgba(150,150,150,0.15); color: var(--text2); }
    .explore-row-plan.pro { background: rgba(108,99,255,0.15); color: var(--accent); }
    .explore-row-plan.elite { background: rgba(245,158,11,0.15); color: var(--gold); }
    .explore-row-followers { font-size: 0.72rem; color: var(--text2); }
    .explore-row-bio { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.1rem; }
    .explore-row-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .explore-follow-btn { padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
    .explore-follow-btn.follow { background: var(--accent); color: #fff; }
    .explore-follow-btn.follow:hover { opacity: 0.88; }
    .explore-follow-btn.following { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .explore-follow-btn.following:hover { background: rgba(255,77,109,0.1); color: var(--red); border-color: var(--red); }
    .explore-follow-btn.admin-locked { background: rgba(108,99,255,0.08); color: var(--accent); border: 1px solid rgba(108,99,255,0.25); cursor: not-allowed; opacity: 0.7; }
    .explore-profile-btn { padding: 0.4rem 0.7rem; border-radius: 8px; font-size: 0.8rem; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; transition: all 0.2s; }
    .explore-profile-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Sentinel infinite scroll */
    .explore-sentinel { height: 40px; display: flex; align-items: center; justify-content: center; }
    .explore-end { text-align: center; color: var(--text2); font-size: 0.8rem; padding: 1rem; }
    .explore-empty { text-align: center; padding: 3rem 2rem; color: var(--text2); }
    .explore-empty i { font-size: 2.5rem; opacity: 0.3; margin-bottom: 0.8rem; display: block; }
    .explore-loading { display: flex; justify-content: center; padding: 2rem; }

    @media (max-width: 768px) {
      .explore-sticky { top: 56px; }
      .explore-row { padding: 0.65rem 0.8rem; gap: 0.7rem; }
      .explore-row-avatar img, .explore-row-avatar .avatar-circle { width: 40px; height: 40px; font-size: 0.9rem; }
      .explore-row-bio { display: none; }
    }
  </style>
  <script>
    // Guard : page reservee aux membres connectes
    (function() {
      var token = localStorage.getItem('pd_jwt');
      if (!token) {
        window.location.replace('dashboard.html?redirect=' + encodeURIComponent(window.location.pathname.split('/').pop()));
      }
    })();
  </script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Pagani<span>Digital</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="formations.html">Formations</a></li>
      <li><a href="ebooks.html">Ebooks</a></li>
      <li><a href="affiliation.html">Affiliation</a></li>
      <li><a href="explore.html" class="active">Explorer</a></li>
      <li><a href="plans.html">Tarifs</a></li>
      <li><a href="dashboard.html" class="btn-nav">Mon Espace</a></li>
    </ul>
    <div class="nav-right">
      <a id="navCustomBtn" href="#" target="_blank" rel="noopener" class="notif-bell" style="display:none" title="">
        <img id="navCustomBtnIcon" src="" alt="" style="width:18px;height:18px;object-fit:contain;border-radius:3px" />
      </a>
      <a href="messages.html" class="notif-bell msg-nav-btn" id="msgNavBtn" title="Messages">
        <i class="fas fa-envelope"></i>
        <span class="notif-badge" id="msgNavBadge" style="display:none">0</span>
      </a>
      <button class="notif-bell" id="notifBell" onclick="PaganiNotif.togglePanel()" title="Notifications">
        <i class="fas fa-bell"></i>
        <span class="notif-badge" id="notifBadge" style="display:none">0</span>
      </button>
      <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </div>
  </nav>

  <div class="explore-page">
    <div class="explore-header">
      <h1>Explorer <span>la communauté</span></h1>
      <p>Découvrez et suivez les membres de Pagani Digital</p>
    </div>

    <div class="explore-sticky">
      <div class="explore-search">
        <i class="fas fa-search"></i>
        <input type="text" id="exploreSearch" placeholder="Rechercher un membre..." oninput="onSearchInput()" autocomplete="off" />
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()"><i class="fas fa-times"></i></button>
      </div>
      <div class="explore-filters">
        <button class="explore-filter-btn active" onclick="filterByPlan('all', this)">Tous</button>
        <button class="explore-filter-btn" onclick="filterByPlan('Pro', this)"><i class="fas fa-crown"></i> Pro</button>
        <button class="explore-filter-btn" onclick="filterByPlan('Elite', this)"><i class="fas fa-gem"></i> Elite</button>
        <button class="explore-filter-btn" onclick="filterBySort('new', this)"><i class="fas fa-clock"></i> Nouveaux</button>
        <button class="explore-filter-btn" onclick="filterBySort('popular', this)"><i class="fas fa-fire"></i> Populaires</button>
      </div>
    </div>

    <div class="explore-count" id="exploreCount"></div>
    <div id="exploreList" class="explore-list">
      <div class="explore-loading"><div class="feed-loader"><span></span><span></span><span></span></div></div>
    </div>
    <div id="exploreSentinel" class="explore-sentinel"></div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <a href="index.html" class="logo">Pagani<span>Digital</span></a>
      <div style="display:flex;flex-direction:column;align-items:center;gap:0.5rem">
        <div style="display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center">
          <a href="cgu.html" style="color:var(--text2);font-size:0.8rem;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">CGU</a>
          <a href="cgu-formateur.html" style="color:var(--text2);font-size:0.8rem;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">CGU Formateur</a>
          <a href="affiliation.html" style="color:var(--text2);font-size:0.8rem;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">Parrainage</a>
          <a href="dashboard.html?tab=trainer" style="color:var(--text2);font-size:0.8rem;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">Devenir Formateur</a>
        </div>
        <p style="color:var(--text2);font-size:0.8rem;margin:0">© 2025 Pagani Digital. Tous droits réservés.</p>
      </div>
      <div class="social-links">
        <a id="footerFacebook" href="#" target="_blank" rel="noopener"><i class="fab fa-facebook"></i></a>
        <a id="footerTiktok" href="#" target="_blank" rel="noopener"><i class="fab fa-tiktok"></i></a>
        <a id="footerTelegram" href="#" target="_blank" rel="noopener"><i class="fab fa-telegram"></i></a>
        <a id="footerYoutube" href="#" target="_blank" rel="noopener"><i class="fab fa-youtube"></i></a>
      </div>
    </div>
  </footer>

  <div id="notifOverlay" onclick="PaganiNotif.togglePanel()" style="display:none;position:fixed;inset:0;z-index:499"></div>
  <div id="notifPanel" class="notif-panel"></div>

  <script src="/js/config.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/api.js?v=1777106940613"></script>
  <script src="/js/app.js?v=1777106940613"></script>
  <script>
    const PAGE_SIZE = 20;
    let _allUsers = [], _filtered = [], _page = 0, _loading = false;
    let _currentUser = null, _followStates = {};
    let _activeFilter = 'all', _activeSort = null;
    let _observer = null;

    document.addEventListener('DOMContentLoaded', async () => {
      _currentUser = await refreshCurrentUser();
      updateNavbar(_currentUser);
      if (window.PaganiNotif) PaganiNotif.startPolling();
      loadFooterSocialLinks();
      await loadExplore();
    });

    async function loadExplore() {
      const list = document.getElementById('exploreList');
      list.innerHTML = '<div class="explore-loading"><div class="feed-loader"><span></span><span></span><span></span></div></div>';
      try {
        const users = await fetch((window.PaganiConfig?.API_BASE_URL || 'http://localhost:3001/api') + '/members').then(r => r.json());
        _allUsers = users.filter(u => u.id !== (_currentUser?.id || null));

        // Charger followers en batch (1 appel par user, en parallele limite)
        await Promise.all(_allUsers.map(async u => {
          try { const s = await PaganiAPI.getFollowStats(u.id); u.followers = s.followers || 0; }
          catch { u.followers = 0; }
        }));

        if (_currentUser) {
          await Promise.all(_allUsers.map(async u => {
            try { const s = await PaganiAPI.getFollowStatus(u.id); _followStates[u.id] = { following: s.following, isAdmin: s.isAdmin || false }; }
            catch { _followStates[u.id] = { following: false, isAdmin: false }; }
          }));
        }
        applyFilters();
      } catch(e) {
        list.innerHTML = '<div class="explore-empty"><i class="fas fa-exclamation-circle"></i><p>Erreur de chargement.</p></div>';
      }
    }

    function applyFilters() {
      let f = [..._allUsers];
      if (_activeFilter !== 'all') f = f.filter(u => u.plan === _activeFilter);
      const q = document.getElementById('exploreSearch').value.toLowerCase().trim();
      if (q) f = f.filter(u => u.name.toLowerCase().includes(q) || (u.bio||'').toLowerCase().includes(q));
      if (_activeSort === 'new') f.sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
      else if (_activeSort === 'popular') f.sort((a,b) => (b.followers||0)-(a.followers||0));
      _filtered = f;
      _page = 0;
      document.getElementById('exploreList').innerHTML = '';
      document.getElementById('exploreCount').innerHTML = `<strong>${f.length}</strong> membre${f.length!==1?'s':''} trouvé${f.length!==1?'s':''}`;
      loadMoreRows();
      setupObserver();
    }

    function loadMoreRows() {
      if (_loading) return;
      const start = _page * PAGE_SIZE;
      const slice = _filtered.slice(start, start + PAGE_SIZE);
      if (!slice.length) {
        if (_page === 0) document.getElementById('exploreList').innerHTML = '<div class="explore-empty"><i class="fas fa-users"></i><p>Aucun membre trouvé.</p></div>';
        document.getElementById('exploreSentinel').innerHTML = _filtered.length > 0 ? '<div class="explore-end"><i class="fas fa-check-circle"></i> Tous les membres affichés</div>' : '';
        return;
      }
      _loading = true;
      const list = document.getElementById('exploreList');
      slice.forEach(u => list.insertAdjacentHTML('beforeend', buildRow(u)));
      _page++;
      _loading = false;
      const sentinel = document.getElementById('exploreSentinel');
      sentinel.innerHTML = _page * PAGE_SIZE < _filtered.length ? '<div class="feed-loader"><span></span><span></span><span></span></div>' : '<div class="explore-end"><i class="fas fa-check-circle"></i> Tous les membres affichés</div>';
    }

    function buildRow(u) {
      const initials = u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const av = u.avatarPhoto
        ? `<img src="${u.avatarPhoto}" alt="" />`
        : `<div class="avatar-circle" style="background:${u.avatarColor||'#6c63ff'}">${initials}</div>`;
      const planIcon = u.plan==='Elite'?'<i class="fas fa-gem"></i>':u.plan==='Pro'?'<i class="fas fa-crown"></i>':'';
      const state = _followStates[u.id] || { following: false, isAdmin: false };
      let btn = '';
      if (!_currentUser) {
        btn = `<button class="explore-follow-btn follow" onclick="event.stopPropagation();window.location.href='dashboard.html'"><i class="fas fa-user-plus"></i> Suivre</button>`;
      } else if (state.following && state.isAdmin) {
        btn = `<button class="explore-follow-btn admin-locked" disabled><i class="fas fa-lock"></i> Suivi</button>`;
      } else if (state.following) {
        btn = `<button class="explore-follow-btn following" onclick="toggleFollowExplore(${u.id},this)"><i class="fas fa-user-check"></i> Suivi</button>`;
      } else {
        btn = `<button class="explore-follow-btn follow" onclick="toggleFollowExplore(${u.id},this)"><i class="fas fa-user-plus"></i> Suivre</button>`;
      }
      return `<div class="explore-row" onclick="window.location.href='profil.html?id=${u.id}'">
        <div class="explore-row-avatar" onclick="event.stopPropagation();window.location.href='profil.html?id=${u.id}'">${av}</div>
        <div class="explore-row-info" onclick="event.stopPropagation();window.location.href='profil.html?id=${u.id}'">
          <div class="explore-row-name">${esc(u.name)}</div>
          <div class="explore-row-meta">
            <span class="explore-row-plan ${u.plan.toLowerCase()}">${planIcon} ${u.plan}</span>
            <span class="explore-row-followers"><i class="fas fa-users" style="font-size:0.65rem"></i> ${u.followers||0}</span>
          </div>
          ${u.bio ? `<div class="explore-row-bio">${esc(u.bio)}</div>` : ''}
        </div>
        <div class="explore-row-actions" onclick="event.stopPropagation()">${btn}</div>
      </div>`;
    }

    function setupObserver() {
      if (_observer) _observer.disconnect();
      _observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadMoreRows();
      }, { rootMargin: '200px' });
      _observer.observe(document.getElementById('exploreSentinel'));
    }

    function onSearchInput() {
      const val = document.getElementById('exploreSearch').value;
      document.getElementById('clearBtn').style.display = val ? 'block' : 'none';
      applyFilters();
    }
    function clearSearch() {
      document.getElementById('exploreSearch').value = '';
      document.getElementById('clearBtn').style.display = 'none';
      applyFilters();
    }
    function filterByPlan(plan, btn) {
      _activeFilter = plan; _activeSort = null;
      document.querySelectorAll('.explore-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); applyFilters();
    }
    function filterBySort(sort, btn) {
      _activeSort = sort; _activeFilter = 'all';
      document.querySelectorAll('.explore-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); applyFilters();
    }

    async function toggleFollowExplore(userId, btn) {
      event.stopPropagation();
      if (!_currentUser) { window.location.href = 'dashboard.html'; return; }
      const state = _followStates[userId] || {};
      if (state.following && state.isAdmin) return;
      btn.disabled = true;
      try {
        const res = await PaganiAPI.toggleFollow(userId);
        _followStates[userId] = { ..._followStates[userId], following: res.following };
        const u = _allUsers.find(x => x.id === userId);
        if (u) u.followers = (u.followers||0) + (res.following ? 1 : -1);
        if (res.following) {
          btn.className = 'explore-follow-btn following';
          btn.innerHTML = '<i class="fas fa-user-check"></i> Suivi';
          btn.onclick = function(){ toggleFollowExplore(userId, this); };
        } else {
          btn.className = 'explore-follow-btn follow';
          btn.innerHTML = '<i class="fas fa-user-plus"></i> Suivre';
          btn.onclick = function(){ toggleFollowExplore(userId, this); };
        }
        btn.disabled = false;
      } catch(e) {
        if (e.message === 'CANNOT_UNFOLLOW_ADMIN') {
          _followStates[userId] = { following: true, isAdmin: true };
          btn.className = 'explore-follow-btn admin-locked';
          btn.innerHTML = '<i class="fas fa-lock"></i> Suivi';
          btn.disabled = true;
        } else { btn.disabled = false; }
      }
    }
  </script>
</body>
</html>
